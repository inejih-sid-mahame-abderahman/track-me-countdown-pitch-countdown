<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⏳ REAL COUNTDOWN · 22 JUL 2026</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0f1a2f, #030812);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      margin: 0;
    }
    .card {
      max-width: 780px;
      width: 100%;
      background: rgba(10, 18, 36, 0.75);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 4rem;
      padding: 2.8rem 2rem;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,215,0,0.08);
      border: 1px solid rgba(255,255,240,0.03);
      transition: 0.2s;
    }
    .top {
      text-align: center;
      margin-bottom: 2.2rem;
    }
    .top h1 {
      font-weight: 400;
      font-size: 1.8rem;
      letter-spacing: 4px;
      color: #c8d6f5;
      text-transform: uppercase;
      text-shadow: 0 4px 12px rgba(0,0,0,0.6);
    }
    .top .start-badge {
      display: inline-block;
      background: rgba(255, 215, 0, 0.12);
      border: 1px solid rgba(255, 215, 0, 0.25);
      border-radius: 60px;
      padding: 0.3rem 1.8rem;
      margin-top: 10px;
      font-size: 1.5rem;
      font-weight: 600;
      color: #fae66b;
      letter-spacing: 2px;
      box-shadow: 0 0 20px rgba(255, 200, 0, 0.1);
    }
    .top .sub {
      display: block;
      margin-top: 8px;
      font-size: 0.95rem;
      font-weight: 300;
      color: #8699cc;
      letter-spacing: 2px;
    }

    /* grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.2rem;
      margin: 2.2rem 0 1.8rem;
    }
    .block {
      background: rgba(0, 0, 0, 0.45);
      border-radius: 2.5rem;
      padding: 0.8rem 0.2rem 0.6rem;
      text-align: center;
      box-shadow: inset 0 6px 14px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.3);
      border-bottom: 2px solid rgba(255,255,255,0.05);
      transition: 0.15s;
    }
    .block:hover { transform: scale(1.02); }
    .number {
      font-size: 4.2rem;
      font-weight: 700;
      color: #f2f8ff;
      letter-spacing: 2px;
      line-height: 1.2;
      text-shadow: 0 4px 16px #00000080;
      font-variant-numeric: tabular-nums;
    }
    .label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: #8fa3de;
      font-weight: 300;
      margin-top: 2px;
      opacity: 0.8;
    }

    /* progress row */
    .info-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.8rem;
      padding-top: 1.2rem;
      border-top: 1px solid rgba(255,255,255,0.05);
      gap: 1rem;
    }
    .progress-wrap {
      flex: 3;
      min-width: 150px;
    }
    .bar-bg {
      background: #0b142b;
      height: 10px;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: inset 0 3px 8px rgba(0,0,0,0.7);
    }
    .bar-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #f7d44a, #f5b81e);
      border-radius: 40px;
      transition: width 0.2s ease;
      box-shadow: 0 0 20px #f5b81eaa;
    }
    .percent-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      letter-spacing: 1px;
      margin-top: 6px;
      color: #7a8ec9;
    }
    .status {
      flex: 1;
      text-align: right;
      font-size: 1.1rem;
      font-weight: 300;
      background: rgba(0,0,0,0.3);
      padding: 0.3rem 1.4rem;
      border-radius: 60px;
      border: 1px solid rgba(255,255,255,0.03);
      color: #d0ddfa;
      white-space: nowrap;
    }
    .status span { font-weight: 500; color: #f5e97b; }

    .footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: #415380;
      border-top: 1px solid rgba(255,255,255,0.03);
      padding-top: 1.2rem;
    }

    @media (max-width: 580px) {
      .card { padding: 1.8rem 1rem; border-radius: 2.5rem; }
      .grid { gap: 0.6rem; }
      .number { font-size: 2.8rem; }
      .label { font-size: 0.6rem; letter-spacing: 1px; }
      .top h1 { font-size: 1.3rem; }
      .top .start-badge { font-size: 1.2rem; padding: 0.2rem 1rem; }
      .status { font-size: 0.9rem; padding: 0.2rem 0.8rem; white-space: normal; }
      .info-row { flex-direction: column; align-items: stretch; }
    }
    @media (max-width: 400px) {
      .number { font-size: 2.2rem; }
      .block { padding: 0.4rem 0.1rem; }
    }
  </style>
</head>
<body>
<div class="card">
  <div class="top">
    <h1>⚡ REAL COUNTDOWN</h1>
    <div class="start-badge">22 · 07 · 2026</div>
    <span class="sub">MONDAY · START OF TWO WEEKS</span>
  </div>

  <div class="grid">
    <div class="block"><div class="number" id="days">00</div><div class="label">Days</div></div>
    <div class="block"><div class="number" id="hours">00</div><div class="label">Hours</div></div>
    <div class="block"><div class="number" id="minutes">00</div><div class="label">Minutes</div></div>
    <div class="block"><div class="number" id="seconds">00</div><div class="label">Seconds</div></div>
  </div>

  <div class="info-row">
    <div class="progress-wrap">
      <div class="bar-bg"><div class="bar-fill" id="progressFill" style="width:0%"></div></div>
      <div class="percent-label"><span>⏮ start</span><span id="progressPercent">0%</span><span>⏭ end</span></div>
    </div>
    <div class="status" id="statusMsg"><span>●</span> LIVE</div>
  </div>
  <div class="footer">14 days · 336 hours · 20,160 minutes</div>
</div>

<script>
  (function() {
    "use strict";

    // FIXED: Monday 22 July 2026, 00:00:00 local time
    const START = new Date(2026, 6, 22, 0, 0, 0, 0);
    const END = new Date(START.getTime() + 14 * 24 * 60 * 60 * 1000);

    const daysEl = document.getElementById('days');
    const hoursEl = document.getElementById('hours');
    const minutesEl = document.getElementById('minutes');
    const secondsEl = document.getElementById('seconds');
    const progressFill = document.getElementById('progressFill');
    const progressPercent = document.getElementById('progressPercent');
    const statusMsg = document.getElementById('statusMsg');

    function pad(n) { return String(n).padStart(2, '0'); }

    function update() {
      const now = new Date();
      const totalDuration = END.getTime() - START.getTime(); // 14 days in ms

      let remaining = END.getTime() - now.getTime();
      let elapsed = now.getTime() - START.getTime();

      // --- determine state ---
      let isBefore = now < START;
      let isAfter = now >= END;

      let days, hours, minutes, seconds;
      let progress = 0;

      if (isBefore) {
        // not started yet: show full 14d 0h 0m 0s
        remaining = totalDuration;
        progress = 0;
      } else if (isAfter) {
        // finished: all zero, progress = 100%
        remaining = 0;
        progress = 1;
      } else {
        // inside the window
        progress = elapsed / totalDuration;
        if (progress < 0) progress = 0;
        if (progress > 1) progress = 1;
      }

      // clamp remaining to avoid negative
      if (remaining < 0) remaining = 0;

      const totalSec = Math.floor(remaining / 1000);
      days = Math.floor(totalSec / 86400);
      hours = Math.floor((totalSec % 86400) / 3600);
      minutes = Math.floor((totalSec % 3600) / 60);
      seconds = Math.floor(totalSec % 60);

      // after end: force 00:00:00 (already but safe)
      if (isAfter) { days = 0; hours = 0; minutes = 0; seconds = 0; }

      // update DOM
      daysEl.textContent = pad(days);
      hoursEl.textContent = pad(hours);
      minutesEl.textContent = pad(minutes);
      secondsEl.textContent = pad(seconds);

      const percent = Math.round(progress * 100);
      progressFill.style.width = percent + '%';
      progressPercent.textContent = percent + '%';

      // status message with real-time indicator
      let msg = '';
      if (isBefore) msg = '⏳ Not started';
      else if (isAfter) msg = '✅ Period complete';
      else msg = '⏳ Counting down';

      // extra: if just at start (within 1 sec)
      if (!isBefore && !isAfter && remaining > 0 && remaining < 2000) {
        msg = '▶ Just started!';
      }

      statusMsg.innerHTML = `<span>${isAfter ? '✓' : '●'}</span> ${msg}`;
    }

    // run immediately and every second
    update();
    setInterval(update, 1000);
  })();
</script>
<!-- 
  REAL TIME COUNTDOWN – starts 22/07/2026 00:00 local.
  No external deps, pure HTML/CSS/JS.
  If today is 25/06/2026, the counter shows days/hours/minutes/secs 
  until the END of the two‑week period (05/08/2026).
  The numbers move every second – guaranteed.
-->
</body>
</html>
