<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fullcnie · stopwatch</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(145deg, #0b1120 0%, #1a2538 100%);
      padding: 1rem;
    }
    .timer-card {
      background: rgba(18, 28, 46, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 3.5rem;
      padding: 2.8rem 2.5rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.06);
      width: 100%;
      max-width: 660px;
      transition: all 0.2s ease;
    }
    .display-wrap {
      background: #0d1629;
      border-radius: 3rem;
      padding: 1.5rem 1rem;
      margin-bottom: 2.5rem;
      box-shadow: inset 0 8px 12px rgba(0, 0, 0, 0.6), 0 2px 0 rgba(255, 255, 255, 0.05);
    }
    .timer-display {
      font-size: 4.8rem;
      font-weight: 600;
      letter-spacing: 6px;
      text-align: center;
      color: #d6e6ff;
      text-shadow: 0 0 12px #3c7eff44, 0 4px 8px #00000055;
      font-variant-numeric: tabular-nums;
      line-height: 1.2;
      word-break: break-word;
    }
    .timer-display span {
      display: inline-block;
      min-width: 4rem;
    }
    .timer-display .colon {
      min-width: 1.2rem;
      color: #6a7f9f;
      text-shadow: none;
      margin: 0 0.1rem;
    }
    .control-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.9rem;
      margin-top: 0.5rem;
    }
    .btn {
      background: #1e2d47;
      border: none;
      border-radius: 3rem;
      padding: 0.9rem 2rem;
      font-size: 1.2rem;
      font-weight: 500;
      color: #ebf3ff;
      cursor: pointer;
      box-shadow: 0 6px 0 #0b111e, 0 6px 12px #00000055;
      transition: all 0.08s linear;
      flex: 1 0 auto;
      min-width: 110px;
      letter-spacing: 0.3px;
      border: 1px solid #3d567a50;
      backdrop-filter: blur(2px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:active {
      transform: translateY(5px);
      box-shadow: 0 1px 0 #0b111e, 0 6px 12px #00000055;
    }
    .btn-primary {
      background: #2b4b7a;
      border-color: #5b82c0;
      color: white;
      text-shadow: 0 1px 2px black;
      box-shadow: 0 6px 0 #13203a, 0 6px 12px #00000055;
    }
    .btn-primary:active {
      box-shadow: 0 1px 0 #13203a, 0 6px 12px #00000055;
    }
    .btn-danger {
      background: #7a2e3b;
      border-color: #b15464;
      box-shadow: 0 6px 0 #451d26, 0 6px 12px #00000055;
    }
    .btn-success {
      background: #1f6b4a;
      border-color: #3da175;
      box-shadow: 0 6px 0 #123d2b, 0 6px 12px #00000055;
    }
    .btn:disabled {
      opacity: 0.5;
      transform: translateY(2px);
      box-shadow: 0 4px 0 #0b111e, 0 6px 12px #00000055;
      pointer-events: none;
      filter: grayscale(0.4);
    }
    .reset-icon {
      font-size: 1.3rem;
      line-height: 1;
    }
    .status-badge {
      text-align: center;
      margin-top: 1.8rem;
      color: #8ea4c9;
      font-size: 1rem;
      letter-spacing: 0.5px;
      background: #0f1a2b80;
      padding: 0.6rem 1.2rem;
      border-radius: 3rem;
      display: inline-block;
      backdrop-filter: blur(2px);
      border: 1px solid #2a3d5e30;
    }
    .footer-wrap {
      display: flex;
      justify-content: center;
    }
    .badge-light {
      background: #1b2940;
      color: #b3c9f0;
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
      font-size: 0.9rem;
      border: 1px solid #3b5177;
    }
    @media (max-width: 500px) {
      .timer-card { padding: 1.8rem 1.2rem; }
      .timer-display { font-size: 3.2rem; letter-spacing: 3px; }
      .btn { padding: 0.8rem 0.8rem; font-size: 1rem; min-width: 80px; }
    }
  </style>
</head>
<body>
  <div class="timer-card">
    <!-- main display -->
    <div class="display-wrap">
      <div class="timer-display" id="timerDisplay">
        <span id="hoursDisplay">00</span>
        <span class="colon">:</span>
        <span id="minutesDisplay">00</span>
        <span class="colon">:</span>
        <span id="secondsDisplay">00</span>
      </div>
    </div>

    <!-- control buttons -->
    <div class="control-group">
      <button class="btn btn-success" id="startBtn" aria-label="Start timer">▶ Start</button>
      <button class="btn btn-primary" id="pauseBtn" aria-label="Pause timer">⏸ Pause</button>
      <button class="btn btn-danger" id="resetBtn" aria-label="Reset timer"><span class="reset-icon">⟳</span> Reset</button>
    </div>

    <!-- extra info / status -->
    <div class="footer-wrap" style="margin-top: 2rem;">
      <div class="status-badge" id="statusMessage">
        ⏱️ ready
      </div>
    </div>
    <div style="display: flex; justify-content: center; margin-top: 1.2rem;">
      <span class="badge-light">fullcnie · live timer</span>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // ----- DOM refs -----
      const hoursSpan = document.getElementById('hoursDisplay');
      const minutesSpan = document.getElementById('minutesDisplay');
      const secondsSpan = document.getElementById('secondsDisplay');
      const startBtn = document.getElementById('startBtn');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');
      const statusMsg = document.getElementById('statusMessage');

      // ----- state -----
      let hours = 0;          // 0–99 (we allow large counts)
      let minutes = 0;        // 0–59
      let seconds = 0;        // 0–59
      let timerInterval = null;
      let isRunning = false;

      // ----- helpers: format with leading zero -----
      function padTwo(num) {
        return String(num).padStart(2, '0');
      }

      // update display from current hours/min/sec
      function updateDisplay() {
        hoursSpan.textContent = padTwo(hours);
        minutesSpan.textContent = padTwo(minutes);
        secondsSpan.textContent = padTwo(seconds);
      }

      // ----- core timer tick (increment by 1 second) -----
      function tick() {
        seconds += 1;
        if (seconds >= 60) {
          seconds = 0;
          minutes += 1;
          if (minutes >= 60) {
            minutes = 0;
            hours += 1;
            // hours can grow indefinitely (we don't cap)
          }
        }
        updateDisplay();
        // optional: keep status fresh
        statusMsg.textContent = `⏳ running · ${padTwo(hours)}:${padTwo(minutes)}:${padTwo(seconds)}`;
      }

      // ----- stopwatch control functions -----
      function startTimer() {
        if (isRunning) return;          // already running
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
        // start fresh interval
        timerInterval = setInterval(tick, 1000);
        isRunning = true;
        statusMsg.textContent = `▶ running · ${padTwo(hours)}:${padTwo(minutes)}:${padTwo(seconds)}`;
        // update button states (optional feedback)
        startBtn.disabled = true;
        pauseBtn.disabled = false;
      }

      function pauseTimer() {
        if (!isRunning) return;         // already paused or stopped
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
        isRunning = false;
        statusMsg.textContent = `⏸ paused · ${padTwo(hours)}:${padTwo(minutes)}:${padTwo(seconds)}`;
        startBtn.disabled = false;
        pauseBtn.disabled = true;
      }

      function resetTimer() {
        // stop any running interval
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
        isRunning = false;
        // reset values
        hours = 0;
        minutes = 0;
        seconds = 0;
        updateDisplay();
        statusMsg.textContent = '⟳ reset · 00:00:00';
        startBtn.disabled = false;
        pauseBtn.disabled = true;   // paused by default after reset
      }

      // ----- initial UI state -----
      function initUI() {
        updateDisplay();
        statusMsg.textContent = '⏱️ ready · 00:00:00';
        startBtn.disabled = false;
        pauseBtn.disabled = true;   // can't pause if not started
        // ensure no interval running
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
        isRunning = false;
      }

      // ----- attach event listeners -----
      startBtn.addEventListener('click', startTimer);
      pauseBtn.addEventListener('click', pauseTimer);
      resetBtn.addEventListener('click', resetTimer);

      // ----- extra: keyboard shortcuts (optional) -----
      document.addEventListener('keydown', (e) => {
        // space -> start/pause toggle (only if not reset)
        if (e.key === ' ' || e.code === 'Space') {
          e.preventDefault();  // prevent scroll
          if (isRunning) {
            pauseTimer();
          } else {
            // if timer is at 00:00:00 and not running, start works
            startTimer();
          }
        }
        // 'r' key -> reset
        if (e.key === 'r' || e.key === 'R') {
          e.preventDefault();
          resetTimer();
        }
      });

      // ----- guard: clean interval on page unload (good practice) -----
      window.addEventListener('beforeunload', function() {
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
      });

      // ----- start with clean state -----
      initUI();

      // extra: let the user know we are fullcnie (just for fun)
      console.log('🧭 fullcnie · stopwatch ready · count hours/min/sec');
    })();
  </script>
</body>
</html>
