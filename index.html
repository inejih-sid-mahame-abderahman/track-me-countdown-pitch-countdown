<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2 Week Countdown</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#ffffff;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
}

h1{
    margin-bottom:30px;
    font-size:2rem;
}

.countdown{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

.box{
    min-width:120px;
    padding:20px;
    border:2px solid #000;
    border-radius:12px;
}

.number{
    font-size:3rem;
    font-weight:bold;
}

.label{
    margin-top:10px;
    font-size:1rem;
}
</style>
</head>
<body>

<div class="container">
    <h1>Time Remaining</h1>

    <div class="countdown">
        <div class="box">
            <div id="days" class="number">0</div>
            <div class="label">Days</div>
        </div>

        <div class="box">
            <div id="hours" class="number">0</div>
            <div class="label">Hours</div>
        </div>

        <div class="box">
            <div id="minutes" class="number">0</div>
            <div class="label">Minutes</div>
        </div>

        <div class="box">
            <div id="seconds" class="number">0</div>
            <div class="label">Seconds</div>
        </div>
    </div>
</div>

<script>
// Start: Monday 22/06/2026
// End: 14 days later
const endDate = new Date("2026-07-06T23:59:59").getTime();

function updateCountdown() {
    const now = new Date().getTime();
    const distance = endDate - now;

    if (distance <= 0) {
        document.querySelector(".countdown").innerHTML =
            "<h2>Countdown Finished</h2>";
        return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("days").textContent = days;
    document.getElementById("hours").textContent = hours;
    document.getElementById("minutes").textContent = minutes;
    document.getElementById("seconds").textContent = seconds;
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>

</body>
</html>
